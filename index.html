<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Blog Preview Card Design</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <article class="card">
    <figure class="card-image">
      <img src="./assets/images/illustration-article.svg" alt="about_article_photo">
    </figure>
    <span class="status">Learning</span>
    <time datetime="2023-12-23" class="date">Published 21 Dec 2023</time>
    <h2 class="title"><a href="#">HTML & CSS foundations</a></h2>
    <p class="about">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    <footer class="card-footer">
      <img class="avatar-image" src="./assets/images/image-avatar.webp" alt="avatar-image">
      <strong class="author">Greg Hooper</strong>
    </footer>
  </article>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Ye Lwin Nyein</a>.
  </footer>
</body>
</html>
